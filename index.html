<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统一认证中心 - SSO</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 320px; text-align: center; }
        .login-box h1 { margin: 0 0 10px 0; font-size: 24px; color: #111; }
        .login-box p { color: #6b7280; font-size: 14px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #e5e7eb; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #f9fafb; outline: none; transition: border 0.2s;}
        input:focus { border-color: #3b82f6; background: white; }
        button { width: 100%; padding: 12px; background: #111; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #374151; }
        #msg { margin-top: 15px; font-size: 14px; color: #ef4444; min-height: 20px;}
        /* 增加不明显的注册按钮样式 */
        #mode-toggle { position: fixed; top: 20px; right: 20px; font-size: 13px; color: #d1d5db; cursor: pointer; transition: color 0.2s; user-select: none; }
        #mode-toggle:hover { color: #6b7280; }
        
        /* ✨ 新增：验证码和邮箱输入框的专属样式 */
        .reg-only { display: none; }
        .code-group { gap: 10px; margin-bottom: 20px; }
        .code-group input { margin-bottom: 0; flex: 1; }
        .code-btn { background: #3b82f6; color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-size: 14px; white-space: nowrap; transition: background 0.2s;}
        .code-btn:hover { background: #2563eb; }
        .code-btn:disabled { background: #9ca3af; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="mode-toggle" onclick="toggleMode()">注册新账号</div>
    <div class="login-box">
        <h1>统一认证中心</h1>
        <p>私有云全家桶 SSO 护照签发</p>
        
        <input type="text" id="username" placeholder="请输入账号" autocomplete="username">
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" onkeypress="if(event.key === 'Enter') document.getElementById('login-btn').click()">
        
        <input type="email" id="email" class="reg-only" placeholder="请输入真实邮箱 (仅注册需要)">
        <div class="code-group reg-only">
            <input type="text" id="code" placeholder="6位验证码" onkeypress="if(event.key === 'Enter') document.getElementById('login-btn').click()">
            <button type="button" id="send-code-btn" class="code-btn" onclick="sendCode()">获取验证码</button>
        </div>
        <button id="login-btn" onclick="doLogin()">签发护照 (登录)</button>
        <div id="msg"></div>
    </div>

    <script>
        let isRegisterMode = false;

        // 切换界面的显示模式
        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            document.querySelector('.login-box h1').innerText = isRegisterMode ? "申请系统护照" : "统一认证中心";
            document.querySelector('.login-box p').innerText = isRegisterMode ? "首次使用请注册主密码" : "私有云全家桶 SSO 护照签发";
            document.getElementById('login-btn').innerText = isRegisterMode ? "确认注册" : "签发护照 (登录)";
            document.getElementById('login-btn').onclick = isRegisterMode ? doRegister : doLogin;
            document.getElementById('mode-toggle').innerText = isRegisterMode ? "返回登录" : "注册新账号";
            document.getElementById('msg').innerText = "";

            // ✨ 新增：动态切换邮箱和验证码模块的显示状态
            const regEls = document.querySelectorAll('.reg-only');
            regEls.forEach(el => {
                if (isRegisterMode) {
                    el.style.display = el.classList.contains('code-group') ? 'flex' : 'block';
                } else {
                    el.style.display = 'none';
                }
            });
        }

        // ✨ 新增：呼叫外卖小哥发送验证码的独立逻辑
        async function sendCode() {
            const e = document.getElementById('email').value.trim();
            const msgObj = document.getElementById('msg');
            const btn = document.getElementById('send-code-btn');

            if (!e || !e.includes('@')) return msgObj.innerText = "请先输入正确的邮箱格式";

            msgObj.innerText = "";
            btn.disabled = true;
            let countdown = 60;
            btn.innerText = `${countdown}s 后重试`;

            // 按钮防刷倒计时
            const timer = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    btn.innerText = `${countdown}s 后重试`;
                } else {
                    clearInterval(timer);
                    btn.innerText = "获取验证码";
                    btn.disabled = false;
                }
            }, 1000);

            try {
                const res = await fetch('/api/send-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: e })
                });

                if (res.ok) {
                    msgObj.style.color = "#10b981";
                    msgObj.innerText = "验证码已发送，请查收邮件 (5分钟有效)";
                } else {
                    const err = await res.text();
                    throw new Error(err);
                }
            } catch (error) {
                clearInterval(timer); // 报错提前解除锁定
                btn.innerText = "获取验证码";
                btn.disabled = false;
                msgObj.style.color = "#ef4444";
                msgObj.innerText = error.message;
            }
        }

        // 独立的注册逻辑
        async function doRegister() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            // ✨ 新增：获取邮箱和验证码
            const e = document.getElementById('email').value.trim();
            const c = document.getElementById('code').value.trim();
            
            const msgObj = document.getElementById('msg');
            const btn = document.getElementById('login-btn');

            // ✨ 修改：增加必填项拦截
            if (!u || !p || !e || !c) return msgObj.innerText = "请完整填写所有注册信息";

            msgObj.innerText = "";
            msgObj.style.color = "#6b7280";
            btn.innerText = "注册哈希计算中...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // ✨ 修改：将 email 和 code 拼装进发送给后端的包裹里
                    body: JSON.stringify({ username: u, password: p, email: e, code: c })
                });

                if (res.ok) {
                    msgObj.style.color = "#10b981"; 
                    msgObj.innerText = "注册成功！正在返回登录界面...";
                    document.getElementById('password').value = ""; // 清空密码防侧漏
                    document.getElementById('code').value = "";     // 清空验证码
                    setTimeout(() => toggleMode(), 1500);
                } else {
                    const err = await res.text();
                    throw new Error(err);
                }
            } catch (e) {
                msgObj.style.color = "#ef4444"; 
                msgObj.innerText = e.message;
            } finally {
                btn.innerText = "确认注册";
                btn.disabled = false;
            }
        }
        
        async function doLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const msgObj = document.getElementById('msg');
            const btn = document.getElementById('login-btn');

            if (!u || !p) return msgObj.innerText = "账号和密码不能为空";

            msgObj.innerText = "";
            msgObj.style.color = "#6b7280";
            btn.innerText = "验证中...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                if (res.ok) {
                    msgObj.style.color = "#10b981"; // 绿色
                    msgObj.innerText = "登录成功！正在进入系统...";
                    
                    // 获取 URL 中的 returnUrl 参数（如果有的话），用于登录后跳回业务系统
                    const urlParams = new URLSearchParams(window.location.search);
                    const returnUrl = urlParams.get('returnUrl');
                    
                    setTimeout(() => {
                        if (returnUrl) {
                            window.location.href = returnUrl;
                        } else {
                            msgObj.innerText = "已获取全域凭证 (无返回目标)";
                        }
                    }, 1000);
                } else {
                    const err = await res.text();
                    throw new Error(err);
                }
            } catch (e) {
                msgObj.style.color = "#ef4444"; // 红色
                msgObj.innerText = e.message;
            } finally {
                btn.innerText = "签发护照 (登录)";
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>
