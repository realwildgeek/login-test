<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统一认证中心 - SSO</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 320px; text-align: center; }
        .login-box h1 { margin: 0 0 10px 0; font-size: 24px; color: #111; }
        .login-box p { color: #6b7280; font-size: 14px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #e5e7eb; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #f9fafb; outline: none; transition: border 0.2s;}
        input:focus { border-color: #3b82f6; background: white; }
        button { width: 100%; padding: 12px; background: #111; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #374151; }
        #msg { margin-top: 15px; font-size: 14px; color: #ef4444; min-height: 20px;}
    </style>
</head>
<body>

    <div class="login-box">
        <h1>统一认证中心</h1>
        <p>私有云全家桶 SSO 护照签发</p>
        
        <input type="text" id="username" placeholder="请输入账号" autocomplete="username">
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" onkeypress="if(event.key === 'Enter') doLogin()">
        
        <button id="login-btn" onclick="doLogin()">签发护照 (登录)</button>
        <div id="msg"></div>
    </div>

    <script>
        async function doLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const msgObj = document.getElementById('msg');
            const btn = document.getElementById('login-btn');

            if (!u || !p) return msgObj.innerText = "账号和密码不能为空";

            msgObj.innerText = "";
            msgObj.style.color = "#6b7280";
            btn.innerText = "验证中...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                if (res.ok) {
                    msgObj.style.color = "#10b981"; // 绿色
                    msgObj.innerText = "登录成功！正在进入系统...";
                    
                    // 获取 URL 中的 returnUrl 参数（如果有的话），用于登录后跳回业务系统
                    const urlParams = new URLSearchParams(window.location.search);
                    const returnUrl = urlParams.get('returnUrl');
                    
                    setTimeout(() => {
                        if (returnUrl) {
                            window.location.href = returnUrl;
                        } else {
                            msgObj.innerText = "已获取全域凭证 (无返回目标)";
                        }
                    }, 1000);
                } else {
                    const err = await res.text();
                    throw new Error(err);
                }
            } catch (e) {
                msgObj.style.color = "#ef4444"; // 红色
                msgObj.innerText = e.message;
            } finally {
                btn.innerText = "签发护照 (登录)";
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>
